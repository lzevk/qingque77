/* 蓝绿 */
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝绿流体渐变实验室</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .fluid-gradient {
            position: fixed;
            width: 200vmax;
            height: 200vmax;
            left: -50vmax;
            top: -50vmax;
            background: 
                radial-gradient(
                    circle at 30% 30%,
                    hsl(190, 100%, 60%),  /* 青蓝色 */
                    transparent
                ),
                radial-gradient(
                    circle at 70% 70%,
                    hsl(140, 100%, 60%),  /* 森林绿 */
                    transparent
                );
            background-blend-mode: multiply;
            animation: 
                drift 40s linear infinite,
                rotate 60s linear infinite;
            will-change: transform;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(5vw,5vh); }
            50% { transform: translate(-3vw,7vh); }
            75% { transform: translate(7vw,-4vh); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .nav-link {
            display: inline-block;
            margin: 10px 5px;
            padding: 12px 24px;
            background: rgba(0, 150, 136, 0.3);  /* 蓝绿色半透明 */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(76, 175, 80, 0.4);  /* 浅绿色悬停效果 */
        }
    </style>
</head>
<body>
    <div class="fluid-gradient"></div>
    <div class="container">
        <h1>蓝绿流体实验室</h1>
        <p>冷色调渐变如极光般流动变幻...</p>
        <a href="red-yellow.html" class="nav-link">红黄渐变模式 →</a>
        <a href="资源分享界面/其他.html" class="nav-link">测试</a>
        <a href="index.html" 
class="nav-link">返回首页</a>
    </div>
</body>
</html>
