<!DOCTYPE html>
<html>
<head>
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin: 0;
            text-align: center;
        }
        nav {
            background-color: #f2f2f2;
            padding: 10px;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        nav ul li {
            display: inline-block;
            margin-right: 10px;
        }
        nav ul li a {
            color: #333;
            text-decoration: none;
            padding: 5px 10px;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<!DOCTYPE html>
<html>
<head>
    <title>其他</title>
</head>
<body>
    <h1>其他</h1>
    <button id="goBackButton">返回上一页</button>

<script>
  // 获取返回按钮元素
  var goBackButton = document.getElementById('goBackButton');

  // 添加点击事件监听器
  goBackButton.addEventListener('click', function() {
    window.history.back();
  });
</script>
<button id="goHomeButton">返回首页</button>

<script>
  // 获取返回首页按钮元素
  var goHomeButton = document.getElementById('goHomeButton');

  // 添加点击事件监听器
  goHomeButton.addEventListener('click', function() {
    window.location.href = "/";
  });
</script>
