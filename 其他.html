<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：适配移动端，防止页面错乱 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>其他</title>
    <style>
        /* 全局重置，消除所有默认边距干扰 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 页面整体：让页脚固定在底部，不会乱跑 */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        /* 头部区域：标题+按钮，居中显示 */
        header {
            padding: 20px 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }

        /* 按钮组样式 */
        .button-group button {
            padding: 10px 25px;
            margin: 0 8px;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            color: #333;
        }

        .button-group button:hover {
            background-color: #eaeaea;
        }

        /* 主内容区：居中、限制宽度，防止内容溢出 */
        main {
            flex: 1;
            padding: 25px 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* 访问码文本 */
        .access-code {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }

        /* 蓝奏云iframe容器：适配宽度 */
        .iframe-box {
            width: 100%;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .iframe-box iframe {
            width: 100%;
            height: 520px;
            border: none;
            display: block;
        }

        /* 页脚：固定在页面最底部 */
        footer {
            background-color: #333;
            color: #fff;
            padding: 18px;
            text-align: center;
            font-size: 14px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <!-- 头部：标题+返回按钮 -->
    <header>
        <h1>其他</h1>
        <div class="button-group">
            <button id="goBack">返回上一页</button>
            <button id="goHome">返回首页</button>
        </div>
    </header>

    <!-- 主内容区：访问码+蓝奏云下载页 -->
    <main>
        <p class="access-code">访问码:7voh</p>
        <div class="iframe-box">
            <iframe src="https://qingque.lanzoui.com/b03whg89g" allowtransparency="true" allow="encrypted-media"></iframe>
        </div>
    </main>

    <!-- 页脚：版权信息 -->
    <footer>
        &copy; 2023 青雀先生. All rights reserved.
    </footer>

    <!-- 交互脚本（只写一次，放在页面最底部） -->
    <script>
        // 返回上一页
        document.getElementById('goBack').addEventListener('click', function() {
            window.history.back();
        });

        // 返回首页
        document.getElementById('goHome').addEventListener('click', function() {
            window.location.href = "/";
        });
    </script>
</body>
</html>
